version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sockpuppet-postgres
    environment:
      POSTGRES_USER: sockpuppet
      POSTGRES_PASSWORD: sockpuppet_dev_password
      POSTGRES_DB: sockpuppet
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sockpuppet']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sockpuppet-network

  redis:
    image: redis:7-alpine
    container_name: sockpuppet-redis
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sockpuppet-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sockpuppet-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://sockpuppet:sockpuppet_dev_password@postgres:5432/sockpuppet
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    env_file:
      - .env
    networks:
      - sockpuppet-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  sockpuppet-network:
    driver: bridge
